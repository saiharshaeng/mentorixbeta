<style>
        body {

            display: flex;
            flex-direction: column;

        .instagram-canvas {

            padding: 70px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255,255,255,0.15);
            position: relative;
            z-index: 10;
        }

        .stardust {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: drift 20s linear infinite;
        }

        @keyframes drift {
            from { transform: translateY(0); }
            to { transform: translateY(-1350px); }
        }

        .glow-text {
            text-shadow: 0 0 25px rgba(255, 255, 255, 0.7), 0 0 50px rgba(0, 221, 221, 0.4);
        }

        .math-symbol {
            position: absolute;
            font-family: 'Bodoni Moda', serif;
            color: rgba(255, 255, 255, 0.05);
            pointer-events: none;
            z-index: 1;

<body class="bg-black">

<!-- 1-Click PNG Download Bar -->
<div class="controls-bar">
    <button class="btn-png" onclick="downloadPNG()">📸 Download 1080x1350 PNG Image</button>
</div>

<!-- Instagram Milestone Graphic Canvas (Exact 1080x1350 Sizing) -->
<div class="instagram-canvas bg-surface-dim" id="instagram-post">

<!-- Full-bleed WebGL background shader -->
<div class="absolute inset-0 w-full h-full opacity-60" style="display:block;">
<canvas id="shader-canvas" style="display:block;width:100%;height:100%"></canvas>
<script>
(function() {
  const canvas = document.getElementById('shader-canvas');

  function syncSize() {
    canvas.width = 1080;
    canvas.height = 1350;
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;

float hash(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}

void main() {
    vec2 uv = v_texCoord;
    vec2 center = uv - 0.5;
    center.x *= u_resolution.x / u_resolution.y;
    
    vec3 color = vec3(0.005, 0.005, 0.01);
    
    float cyanGlow = 1.0 - length(uv - vec2(0.2, 0.2)) * 1.5;
    color += vec3(0.0, 1.0, 1.0) * max(0.0, cyanGlow) * 0.12;
    
    float purpleGlow = 1.0 - length(uv - vec2(0.8, 0.8)) * 1.5;
    color += vec3(0.75, 0.25, 0.75) * max(0.0, purpleGlow) * 0.18;

    float goldGlow = 1.0 - length(uv - vec2(0.9, 0.1)) * 2.0;
    color += vec3(1.0, 0.84, 0.0) * max(0.0, goldGlow) * 0.08;
    
    for(int i = 0; i < 40; i++) {
        float t = u_time * 0.1 + float(i) * 123.456;
        vec2 pos = vec2(hash(vec2(float(i), 1.0)), hash(vec2(float(i), 2.0)));
        pos.x += sin(t + pos.y * 6.28) * 0.1;
        pos.y += cos(t + pos.x * 6.28) * 0.1;
        
        float dist = length(uv - pos);
        float size = 0.0015 * (1.0 + sin(t * 5.0) * 0.5);
        color += vec3(0.9, 0.9, 1.0) * smoothstep(size, 0.0, dist) * 0.5;
    }
    
    color += (hash(uv + u_time * 0.01) - 0.5) * 0.02;
    gl_FragColor = vec4(color, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');

  function render(t) {
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>
</div>

<!-- Dynamic Particles / Stardust -->
<div class="absolute inset-0 pointer-events-none" id="particle-container"></div>

<!-- Floating Decorative Math Symbols -->
<div class="math-symbol text-[120px] top-40 left-20 rotate-12">Σ</div>
<div class="math-symbol text-[80px] bottom-60 right-20 -rotate-12">∫</div>

  <!-- Glassmorphic Card -->
  <div class="glass-card">
    <h1 class="font-accent-sm italic text-[175px] leading-none glow-text mb-2 text-primary" style="font-family: 'Bodoni Moda', serif; font-weight: 900;">2,000+</h1>
    <p class="font-label-caps text-3xl tracking-[0.35em] text-on-surface-variant opacity-90 text-center font-bold" style="font-family: 'Poiret One', cursive;">LEARNERS REACHED</p>

    <!-- Inner Bloom Effect Element -->

  </div>
  <!-- Caption below card -->
  <div class="mt-14 text-center px-10">
    <p class="font-display-lg text-4xl leading-relaxed text-on-surface font-light" style="font-family: 'Playfair Display', serif;">
      2,000 minds. 2,000 dreams. <br/> 2,000 lives touched. <span class="text-cyan-400">💙</span>
    </p>
  </div>
</div>

<!-- Footer Section -->
<div class="z-20 w-full flex flex-col items-center gap-10">
  <!-- Quote -->

<!-- Decorative Light Leaks -->
<div class="absolute top-0 right-0 w-[600px] h-[600px] bg-secondary/10 blur-[150px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-cyan-400/10 blur-[150px] rounded-full pointer-events-none"></div>
</div>

<script>
    // Stardust particle generator
    const container = document.getElementById('particle-container');
    const particleCount = 60;

    for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement('div');
        particle.className = 'stardust';
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const size = Math.random() * 3 + 1;
        const delay = Math.random() * 20;
        const duration = 15 + Math.random() * 15;
        const opacity = 0.1 + Math.random() * 0.4;

        particle.style.left = `${x}%`;
        particle.style.top = `${y}%`;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.opacity = opacity;
        particle.style.animationDuration = `${duration}s`;
        particle.style.animationDelay = `-${delay}s`;

        container.appendChild(particle);
    }

    // 1-Click PNG Download Function
    function downloadPNG() {
        const el = document.getElementById('instagram-post');
        html2canvas(el, {
            scale: 2,
            useCORS: true,
            allowTaint: true,
            backgroundColor: '#000000'
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'mentorix_2k_learners_instagram.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>
